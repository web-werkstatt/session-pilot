version: "3.8"

services:
  hilfe-center:
    build: .
    container_name: sessionpilot-hilfe
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-sessionpilot-hilfe-secret}
      - URL_PREFIX=
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "coolify.managed=true"
