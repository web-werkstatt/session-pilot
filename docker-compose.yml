services:
  dashboard:
    build: .
    container_name: project-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-5055}:5055"
    env_file:
      - .env
    volumes:
      # Projects directory (read-only)
      - ${DASHBOARD_PROJECTS_DIR:-/mnt/projects}:/mnt/projects:ro
      # JSON data stores (persistent)
      - ./groups.json:/app/groups.json
      - ./relations.json:/app/relations.json
      - ./ideas.json:/app/ideas.json
      - ./scheduled_tasks.json:/app/scheduled_tasks.json
      - ./external_links.json:/app/external_links.json
      - ./account_plans.json:/app/account_plans.json
      # Docker socket for container status
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # AI assistant accounts (read-only, auto-discovered)
      # Mount the entire home directory's dotfiles for auto-discovery,
      # or mount individual accounts:
      - ${HOME}/.claude:/home/user/.claude:ro
      # Uncomment additional accounts as needed:
      # - ${HOME}/.claude-account1:/home/user/.claude-account1:ro
      # - ${HOME}/.claude-work:/home/user/.claude-work:ro
      # - ${HOME}/.codex:/home/user/.codex:ro
      # - ${HOME}/.gemini:/home/user/.gemini:ro
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: project-dashboard-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-project_dashboard}
      POSTGRES_USER: ${DB_USER:-dashboard}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dashboard}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
