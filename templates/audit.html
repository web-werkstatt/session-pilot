{% extends "base.html" %}
{% block title %}Spec Audits{% endblock %}
{% block breadcrumb %}Spec Audits{% endblock %}

{% block head_extra %}
<link rel="stylesheet" href="/static/css/audit.css?v={{ cache_bust }}">
{% endblock %}

{% block content %}
    <!-- Run Audit -->
    <div class="card audit-run-card">
        <h3>Audit starten</h3>
        <div class="audit-run-form">
            <div class="form-row">
                <label for="auditSpecId">Spec ID</label>
                <input type="text" id="auditSpecId" placeholder="z.B. SPEC-AUDIT-001" autocomplete="off">
            </div>
            <div class="form-row">
                <label for="auditInputFacts">Input Facts (JSON)</label>
                <textarea id="auditInputFacts" rows="4" placeholder='{"changed_files": ["routes/audit_routes.py"]}'></textarea>
            </div>
            <div class="form-actions">
                <button id="btnRunAudit" class="btn btn-primary" onclick="runAudit()">Run Audit</button>
                <button id="btnLoadLatest" class="btn btn-secondary" onclick="loadLatest()">Latest laden</button>
            </div>
            <div id="auditError" class="audit-error" style="display:none"></div>
            <div id="auditLoading" class="audit-loading" style="display:none">Audit wird ausgefuehrt...</div>
        </div>
    </div>

    <!-- Result Display -->
    <div id="auditResult" style="display:none">
        <!-- Header -->
        <div class="card audit-header-card">
            <div class="audit-header">
                <div class="audit-header-main">
                    <h2 id="resultSpecTitle"></h2>
                    <span id="resultOverallStatus" class="audit-status-badge"></span>
                </div>
                <div class="audit-header-meta">
                    <span id="resultSpecId" class="meta-item"></span>
                    <span id="resultDuration" class="meta-item"></span>
                    <span id="resultStarted" class="meta-item"></span>
                    <span id="resultRunId" class="meta-item"></span>
                </div>
                <div id="resultSummary" class="audit-summary"></div>
            </div>
        </div>

        <!-- Requirements -->
        <div class="card">
            <h3>Requirements</h3>
            <div id="resultRequirements" class="audit-requirements"></div>
        </div>
    </div>
{% endblock %}

{% block scripts %}
<script src="/static/js/audit.js?v={{ cache_bust }}"></script>
{% endblock %}
