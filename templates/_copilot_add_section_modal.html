<div class="modal-overlay" id="addSectionModal">
    <div class="modal-content" style="max-width:500px;">
        <div class="modal-header">
            <h2>Neuer AI Task</h2>
            <button class="modal-close" onclick="closeModal('addSectionModal')">&times;</button>
        </div>
        <div class="modal-body" style="padding:16px 24px;">
            <div class="form-group" style="margin-bottom:12px;">
                <label style="font-size:13px;font-weight:600;">Titel</label>
                <input type="text" id="newSectionTitle" class="filter-select" style="width:100%;padding:8px;" placeholder="z.B. Governance Rules definieren">
            </div>
            <div class="form-group" style="margin-bottom:12px;">
                <label style="font-size:13px;font-weight:600;">Typ</label>
                <select id="newSectionKind" class="filter-select" style="width:100%;padding:8px;">
                    <option value="section">AI Task</option>
                    <option value="spec">Spec</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom:12px;">
                <label style="font-size:13px;font-weight:600;">Beschreibung (optional)</label>
                <textarea id="newSectionSummary" class="filter-select" style="width:100%;padding:8px;min-height:60px;resize:vertical;font-family:inherit;" placeholder="Was soll dieser Task erreichen?"></textarea>
            </div>
            <div class="form-group" style="margin-bottom:12px;">
                <label style="font-size:13px;font-weight:600;">Spec-Referenz (optional)</label>
                <input type="text" id="newSectionSpecRef" class="filter-select" style="width:100%;padding:8px;" placeholder="z.B. SPEC-QUALITY-001">
            </div>
            <button class="btn btn-primary" onclick="createSection()" style="width:100%;">Erstellen</button>
        </div>
    </div>
</div>
